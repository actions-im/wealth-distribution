name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -q
      - run: uvx ruff check Home.py pages src scripts tests
      - run: uv run python -m compileall -q Home.py pages src scripts tests
      - run: uv run python -c "from src.source_manifest import load_source_registry; assert load_source_registry()"
      - run: uv run python scripts/reproduce_report.py --fixture --output-dir build/report
